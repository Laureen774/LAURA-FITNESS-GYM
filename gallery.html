<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery | Laura Fitness Gym</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f7fb;
      color: #222;
    }

    nav {
      background: #f8f8f8;
      padding: 0 2rem;
      border-bottom: 2px solid #eee;
    }

    nav ul {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin: 0;
      padding: 0.8rem 0 0;
    }

    nav ul li a {
      display: inline-block;
      padding: 12px 18px;
      text-decoration: none;
      color: #555;
      background: #fff;
      border: 2px solid transparent;
      border-radius: 10px 10px 0 0;
      font-weight: 600;
      transition: all 0.25s ease;
    }

    nav ul li a:hover {
      background: #fff7f0;
      color: #ff4d00;
      border-color: #ffd1b3;
    }

    nav ul li a.active {
      background: #fff;
      color: #ff4d00;
      border-color: #ff4d00;
      border-bottom-color: transparent;
    }

    .container {
      max-width: 1000px;
      margin: 3rem auto;
      padding: 2rem;
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.08);
    }

    .container h1 {
      margin-top: 0;
      font-size: 2.8rem;
      color: #1a1a1a;
    }

    .container p {
      color: plum;
      line-height: 1.8;
      margin-bottom: 2rem;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1.5rem;
    }

    .gallery-card {
      position: relative;
      overflow: hidden;
      border-radius: 20px;
      box-shadow: 0 14px 40px rgba(0,0,0,0.08);
    }

    .gallery-card img {
      width: 100%;
      height: 320px;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }

    .gallery-card:hover img {
      transform: scale(1.05);
    }

    footer {
      text-align: center;
      padding: 1.5rem 2rem 3rem;
      color: rgb(0, 153, 255);
      font-size: 0.95rem;
    }
    
    .gallery-card .label {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 1.2rem 1.5rem;
      background: rgba(0,0,0,0.55);
      color: #fff;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

  </style>
</head>
<body>
  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="services.html">Services</a></li>
      <li><a href="trainers.html">Trainers</a></li>
      <li><a href="pricing.html">Pricing</a></li>
      <li><a href="gallery.html" class="active">Gallery</a></li>
      <li><a href="faq.html">FAQ</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <div class="container">
    <h1>Gallery</h1>
    <p>Take a look inside our Cardio Zone, Group Classes, Personal Training sessions, and the main gym floor.</p>
    <div class="gallery-grid">
      <div class="gallery-card">
        <img src="cardio.jpg" alt="Cardio Zone"> <!-- FIXED: removed images/ -->
        <div class="label">Cardio Zone</div>
      </div>
        <div class="gallery-card">
            <img src="zumba.jpg" alt="Group Classes"> <!-- FIXED -->
            <div class="label">Group Classes</div>
        </div>
        <div class="gallery-card">
            <img src="training.jpg" alt="Personal Training"> <!-- FIXED -->
            <div class="label">Personal Training</div>
        </div>
        <div class="gallery-card">
            <img src="gym.jpg" alt="Gym Floor"> <!-- FIXED -->
            <div class="label">Gym Floor</div>
        </div>
    </div>
  </div>
  <footer>© 2026 Laura Fitness Gym</footer>
</body>
</html>
